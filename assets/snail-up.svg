<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">

  <!-- shell (large, centered, dominant) -->
  <circle cx="24" cy="26" r="13" fill="#8B5E3C"/>
  <circle cx="24" cy="25" r="9"  fill="#A0714F"/>
  <circle cx="24" cy="24" r="5"  fill="#BD8C64"/>

  <!-- body peeking above shell -->
  <ellipse cx="24" cy="14" rx="6" ry="4" fill="#E8D44D"/>

  <!-- slime trail hint -->
  <ellipse cx="24" cy="40" rx="3" ry="1.5" fill="#E8D44D" opacity="0.3"/>

  <!-- antenna left (splayed outward) -->
  <line x1="20" y1="12" x2="12" y2="4" stroke="#E8D44D" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="12" cy="4" r="2" fill="#E8D44D"/>

  <!-- antenna right (splayed outward) -->
  <line x1="28" y1="12" x2="36" y2="4" stroke="#E8D44D" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="36" cy="4" r="2" fill="#E8D44D"/>

</svg>