<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">

  <!-- shell (behind, at top) -->
  <circle cx="24" cy="18" r="13" fill="#8B5E3C"/>
  <circle cx="24" cy="19" r="9"  fill="#A0714F"/>
  <circle cx="24" cy="20" r="5"  fill="#BD8C64"/>

  <!-- body (wavy foot) -->
  <path d="M 18 34 C 18 29 30 29 30 34 L 30.0 33.1 L 28.5 37.4 L 27.0 39.3 L 25.5 39.4 L 24.0 38.5 L 22.5 37.8 L 21.0 38.1 L 19.5 38.1 L 18.0 34.9 Z" fill="#E8D44D"/>

  <!-- slime trail -->
