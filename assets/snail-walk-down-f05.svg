  <!-- antenna left — eye at stalk tip -->
  <line x1="20" y1="32" x2="13.4" y2="41.1" stroke="#E8D44D" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="13.4" cy="41.1" r="2" fill="#1a1a1a"/>
  <circle cx="14.0" cy="40.4" r="0.7" fill="white"/>

  <!-- antenna right — eye at stalk tip -->
  <line x1="28" y1="32" x2="33.4" y2="41.1" stroke="#E8D44D" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="33.4" cy="41.1" r="2" fill="#1a1a1a"/>
  <circle cx="34.0" cy="40.4" r="0.7" fill="white"/>

  <!-- mouth -->
  <path d="M22 36 Q24 38 26 36" stroke="#1a1a1a" stroke-width="0.8" fill="none" stroke-linecap="round"/>

</svg>