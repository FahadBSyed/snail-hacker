<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- ── Desk unit oblique faces ── -->
  <polygon points="10,40 54,40 66,33 22,33"
           fill="#ccc9c1" stroke="#555045" stroke-width="1"/>
  <polygon points="54,40 54,58 66,51 66,33"
           fill="#808070" stroke="#555045" stroke-width="1"/>
  <!-- Desk front face -->
  <rect x="10" y="40" width="44" height="18" fill="#b8b5ad" stroke="#555045" stroke-width="1"/>
  <!-- Drive bay slots on desk front -->
  <rect x="14"  y="44"  width="16" height="3" rx="0.5" fill="#3a3730" stroke="#999488" stroke-width="0.5"/>
  <rect x="14"  y="49"  width="16" height="3" rx="0.5" fill="#3a3730" stroke="#999488" stroke-width="0.5"/>
  <!-- Drive LED -->
  <circle cx="34" cy="45.5" r="1.5" fill="#66ff88" opacity="0.9"/>
  <circle cx="34" cy="45.5" r="3"   fill="#66ff88" opacity="0.2"/>
  <!-- Vent grille on desk right -->
  <line x1="42" y1="43"  x2="50" y2="43"  stroke="#999488" stroke-width="0.7"/>
  <line x1="42" y1="46"  x2="50" y2="46"  stroke="#999488" stroke-width="0.7"/>
  <line x1="42" y1="49"  x2="50" y2="49"  stroke="#999488" stroke-width="0.7"/>
  <line x1="42" y1="52" x2="50" y2="52" stroke="#999488" stroke-width="0.7"/>

  <!-- ── Monitor oblique faces ── -->
  <polygon points="14,14 50,14 60,8 24,8"
           fill="#d8d5cc" stroke="#555045" stroke-width="1"/>
  <polygon points="50,14 50,40 60,34 60,8"
           fill="#8a8880" stroke="#555045" stroke-width="1"/>
  <!-- Monitor front face (bezel) -->
  <rect x="14" y="14" width="36" height="26" fill="#c0bdb5" stroke="#555045" stroke-width="1"/>
  <!-- CRT bezel inset -->
  <rect x="17" y="17" width="30" height="19" rx="2"
        fill="#3a3730" stroke="#555045" stroke-width="0.8"/>
  <!-- CRT screen -->
  <rect x="19" y="19" width="26" height="15" rx="1"
        fill="#001a12" stroke="#66ff88" stroke-width="0.8"/>

  <!-- Scan-line glow on screen -->
  <rect x="20" y="21"  width="24" height="1.2" fill="#66ff88" opacity="0.55"/>
  <rect x="20" y="24" width="24" height="1.2" fill="#66ff88" opacity="0.4"/>
  <rect x="20" y="27" width="24" height="1.2" fill="#66ff88" opacity="0.55"/>
  <rect x="20" y="30" width="22" height="1.2" fill="#66ff88" opacity="0.3"/>
  <!-- Screen ambient glow -->
  <rect x="19" y="19" width="26" height="15" rx="1"
        fill="#66ff88" opacity="0.05"/>

  <!-- Screen glare highlight (top-left) -->
  <rect x="20" y="19" width="6" height="3" rx="1"
        fill="white" opacity="0.12"/>

  <!-- Indicator LED on bezel (bottom-right) -->
  <circle cx="44" cy="35" r="1.8" fill="#66ff88"/>
  <circle cx="44" cy="35" r="3.5" fill="#66ff88" opacity="0.2"/>

  <!-- Monitor brand badge (embossed strip) -->
  <rect x="24" y="35" width="16" height="2.5" rx="0.5"
        fill="#8a8880" opacity="0.6"/>

  <!-- Type-specific accent detail -->
  
  <!-- Health cross -->
  <rect x="27" y="32" width="10" height="3" rx="0.5" fill="#66ff88" opacity="0.8"/>
  <rect x="30.5" y="29" width="3" height="9" rx="0.5" fill="#66ff88" opacity="0.8"/>
  <!-- Wrench on desk -->
  <path d="M40,51 l6,-6 a2,2 0 0 1 4,3 l-6,6 a2,2 0 0 1 -4,-3z"
        fill="#66ff88" opacity="0.7"/>
  <circle cx="43" cy="50" r="1.5" fill="none" stroke="#66ff88" stroke-width="0.8"/>

</svg>