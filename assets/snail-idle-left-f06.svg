<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">

  <g transform="translate(48, 0) scale(-1, 1)">

  <!-- body hump (ellipse) -->
  <ellipse cx="30" cy="26" rx="12" ry="6" fill="#E8D44D"/>
  <!-- foot prism -->
  <path d="M 18 30 L 42 30 L 42 34 L 18 34 Z" fill="#E8D44D"/>

  <!-- slime trail -->
  <ellipse cx="14" cy="36" rx="4" ry="1.2" fill="#E8D44D" opacity="0.25"/>

  <!-- antenna left — eye at stalk tip -->
  <line x1="32" y1="24" x2="28.0" y2="14.0" stroke="#E8D44D" stroke-width="1.5" stroke-linecap="round"/>
  <!-- antenna right — eye at stalk tip -->
  <line x1="36" y1="24" x2="38.0" y2="12.0" stroke="#E8D44D" stroke-width="1.5" stroke-linecap="round"/>

  <!-- shell LAST — sits on top of body -->
  <circle cx="18" cy="24" r="12" fill="#8B5E3C"/>
  <circle cx="19" cy="24" r="8"  fill="#A0714F"/>
  <circle cx="20" cy="24" r="4"  fill="#BD8C64"/>

  <circle cx="28.0" cy="14.0" r="0.2" fill="#1a1a1a"/>
  
  <circle cx="38.0" cy="12.0" r="0.2" fill="#1a1a1a"/>
  
  </g>

</svg>