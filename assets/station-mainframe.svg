<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">

  <!-- ── Cabinet oblique sides ── -->
  <polygon points="14,44 74,44 92,34 32,34"   fill="#e2e4ea"  stroke="#5a6070" stroke-width="1"/>
  <polygon points="74,44 74,82 92,72 92,34" fill="#9298a4" stroke="#5a6070" stroke-width="1"/>

  <!-- ── Cabinet front face ── -->
  <rect x="14" y="44" width="60" height="38" fill="#c8ccd4" stroke="#5a6070" stroke-width="1"/>

  <!-- Dark panel strip across top of front face (contains LEDs) -->
  <rect x="14" y="44" width="60" height="11" fill="#1a1e2a" stroke="none"/>

  <!-- Status LEDs -->
  <circle cx="21"  cy="49.5" r="2.5" fill="#33ff44"/>
  <circle cx="28" cy="49.5" r="2.5" fill="#33ff44"/>
  <circle cx="35" cy="49.5" r="2.5" fill="#ffbb00"/>
  <circle cx="42" cy="49.5" r="2.5" fill="#ff3322"/>
  <!-- LED glow halos -->
  <circle cx="21"  cy="49.5" r="4" fill="#33ff44"  opacity="0.25"/>
  <circle cx="42" cy="49.5" r="4" fill="#ff3322"    opacity="0.25"/>

  <!-- CRT matrix display (central, glowing) -->
  <rect x="20" y="58" width="30" height="19" rx="2" fill="#1a1e2a" stroke="#00ffcc" stroke-width="1"/>
  <!-- Scan-line effect: thin horizontal lines -->
  <rect x="21"  y="60" width="28" height="1" fill="#00ffcc" opacity="0.6"/>
  <rect x="21"  y="63" width="28" height="1" fill="#00ffcc" opacity="0.4"/>
  <rect x="21"  y="66" width="28" height="1" fill="#00ffcc" opacity="0.6"/>
  <rect x="21"  y="69" width="20" height="1" fill="#00ffcc" opacity="0.3"/>
  <rect x="21"  y="72" width="24" height="1" fill="#00ffcc" opacity="0.5"/>
  <!-- Screen ambient glow -->
  <rect x="20" y="58" width="30" height="19" rx="2" fill="#00ffcc" opacity="0.07"/>

  <!-- Tape reels — right side of front face -->
  <!-- Left reel -->
  <circle cx="58" cy="62" r="8"   fill="#2a2e38" stroke="#444a58" stroke-width="1.5"/>
  <circle cx="58" cy="62" r="3"   fill="#888ea0"/>
  <!-- Reel spokes -->
  <line x1="58" y1="56" x2="58" y2="59" stroke="#444a58" stroke-width="1"/>
  <line x1="58" y1="65" x2="58" y2="68" stroke="#444a58" stroke-width="1"/>
  <line x1="52" y1="62" x2="55" y2="62" stroke="#444a58" stroke-width="1"/>
  <line x1="61" y1="62" x2="64" y2="62" stroke="#444a58" stroke-width="1"/>
  <!-- Right reel (smaller) -->
  <circle cx="66" cy="70" r="5.5" fill="#2a2e38" stroke="#444a58" stroke-width="1.5"/>
  <circle cx="66" cy="70" r="2"   fill="#888ea0"/>

  <!-- Vent grille (bottom-right of front face) -->
  <rect x="52" y="61" width="18" height="18" fill="none" stroke="none"/>
  <line x1="52" y1="79" x2="69" y2="79" stroke="#555a66" stroke-width="0.8"/>
  <line x1="52" y1="77" x2="69" y2="77" stroke="#555a66" stroke-width="0.8"/>
  <line x1="52" y1="75" x2="69" y2="75" stroke="#555a66" stroke-width="0.8"/>

  <!-- Punch-card slot (bottom-left) -->
  <rect x="19" y="80" width="22" height="4" rx="1" fill="#1a1e2a" stroke="#555a66" stroke-width="0.8"/>

  <!-- ── Gun mount platform (raised disc on top face) ── -->
  <!-- Shadow/base ring on top face -->
  <ellipse cx="55" cy="37" rx="14" ry="6" fill="#00000033"/>
  <!-- Mount disc -->
  <ellipse cx="53" cy="34"     rx="14" ry="6"   fill="#9298a4" stroke="#5a6070" stroke-width="1"/>
  <ellipse cx="53" cy="30" rx="11" ry="4.5" fill="#c8ccd4" stroke="#5a6070" stroke-width="0.8"/>
  <!-- Centre pivot hole -->
  <circle  cx="53" cy="30" r="3"   fill="#1a1e2a" stroke="#5a6070" stroke-width="0.8"/>

</svg>