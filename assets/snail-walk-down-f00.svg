<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">

  <!-- shell (behind, at top) -->
  <circle cx="24" cy="18" r="13" fill="#8B5E3C"/>
  <circle cx="24" cy="19" r="9"  fill="#A0714F"/>
  <circle cx="24" cy="20" r="5"  fill="#BD8C64"/>

  <!-- body (wavy foot) -->
  <path d="M 18 34 C 18 29 30 29 30 34 L 30.0 34.0 L 28.5 38.2 L 27.0 39.0 L 25.5 38.5 L 24.0 38.0 L 22.5 38.5 L 21.0 39.0 L 19.5 38.2 L 18.0 34.0 Z" fill="#E8D44D"/>

  <!-- slime trail -->
  <ellipse cx="24" cy="8" rx="3" ry="1.5" fill="#E8D44D" opacity="0.3"/>

  <!-- antenna left — eye at stalk tip -->
  <line x1="20" y1="32" x2="14.0" y2="42.0" stroke="#E8D44D" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="14.0" cy="42.0" r="2" fill="#1a1a1a"/>
  <circle cx="14.6" cy="41.3" r="0.7" fill="white"/>

  <!-- antenna right — eye at stalk tip -->
  <line x1="28" y1="32" x2="34.0" y2="42.0" stroke="#E8D44D" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="34.0" cy="42.0" r="2" fill="#1a1a1a"/>
  <circle cx="34.6" cy="41.3" r="0.7" fill="white"/>

  <!-- mouth -->
  <path d="M22 36 Q24 38 26 36" stroke="#1a1a1a" stroke-width="0.8" fill="none" stroke-linecap="round"/>

</svg>