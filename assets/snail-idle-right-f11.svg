  <!-- antenna left — drifting eye -->
  <line x1="32" y1="26" x2="26.8" y2="14.0" stroke="#E8D44D" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="26.8" cy="14.0" r="2.0" fill="#1a1a1a"/>
  <circle cx="27.3" cy="13.3" r="0.6" fill="white"/>

  <!-- antenna right — drifting eye -->
  <line x1="36" y1="26" x2="36.8" y2="12.0" stroke="#E8D44D" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="36.8" cy="12.0" r="2.0" fill="#1a1a1a"/>
  <circle cx="37.4" cy="11.3" r="0.6" fill="white"/>

</svg>