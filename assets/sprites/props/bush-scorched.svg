<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 60" width="72" height="60">

  <!-- Ground shadow (faint smoke stain) -->
  <ellipse cx="37" cy="56" rx="30" ry="6" fill="#000000" opacity="0.25"/>
  <!-- Smoke haze at base -->
  <ellipse cx="37" cy="50" rx="22" ry="4" fill="#555555" opacity="0.12"/>

  <!-- Charred stem -->
  <rect x="30" y="50" width="12" height="9" rx="3" fill="#2a1a0a"/>

  <!-- Outer charred mass -->
  <circle cx="36" cy="38" r="22" fill="#1a1a1a"/>
  <circle cx="20" cy="40" r="16" fill="#1a1a1a"/>
  <circle cx="52" cy="40" r="16" fill="#1a1a1a"/>

  <!-- Mid ash layer -->
  <circle cx="36" cy="34" r="19" fill="#2a2a2a"/>
  <circle cx="22" cy="37" r="14" fill="#2a2a2a"/>
  <circle cx="50" cy="37" r="14" fill="#2a2a2a"/>

  <!-- Upper ash (slightly lighter — surface ash, not deep char) -->
  <circle cx="36" cy="28" r="14" fill="#4a4a4a"/>
  <circle cx="26" cy="31" r="10" fill="#4a4a4a"/>
  <circle cx="46" cy="31" r="10" fill="#4a4a4a"/>

  <!-- Crumbled silhouette details -->
  <circle cx="18" cy="35" r="5"  fill="#1a1a1a" opacity="0.8"/>
  <circle cx="54" cy="35" r="5"  fill="#1a1a1a" opacity="0.8"/>
  <circle cx="14" cy="43" r="4"  fill="#1a1a1a" opacity="0.7"/>
  <circle cx="58" cy="43" r="4"  fill="#1a1a1a" opacity="0.7"/>
  <circle cx="36" cy="16" r="6"  fill="#4a4a4a" opacity="0.5"/>

  <!-- Hot embers scattered across the surface -->
  <circle cx="28" cy="22" r="2"   fill="#ff4400"  opacity="0.9"/>
  <circle cx="28" cy="22" r="4"   fill="#ff4400"  opacity="0.3"/>
  <circle cx="44" cy="26" r="1.8" fill="#ffaa00" opacity="0.9"/>
  <circle cx="44" cy="26" r="3.5" fill="#ffaa00" opacity="0.25"/>
  <circle cx="20" cy="32" r="1.5" fill="#ff4400"  opacity="0.8"/>
  <circle cx="52" cy="30" r="1.6" fill="#ffaa00" opacity="0.8"/>
  <circle cx="36" cy="20" r="2.2" fill="#ff4400"  opacity="0.85"/>
  <circle cx="36" cy="20" r="5"   fill="#ff4400"  opacity="0.2"/>
  <circle cx="24" cy="40" r="1.3" fill="#ffaa00" opacity="0.7"/>
  <circle cx="50" cy="38" r="1.4" fill="#ff4400"  opacity="0.7"/>
  <circle cx="38" cy="34" r="1.2" fill="#ffaa00" opacity="0.75"/>

  <!-- Ambient ember glow (faint orange halo over whole bush) -->
  <circle cx="36" cy="32" r="22" fill="#ff4400" opacity="0.04"/>

</svg>