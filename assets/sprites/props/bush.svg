<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 60" width="72" height="60">

  <!-- Ground shadow -->
  <ellipse cx="37" cy="56" rx="28" ry="5" fill="#000000" opacity="0.18"/>

  <!-- Stem -->
  <rect x="30" y="50" width="12" height="9" rx="3" fill="#5a3a18"/>
  <rect x="33" y="48" width="6"  height="5" rx="2" fill="#5a3a18" opacity="0.8"/>

  <!-- Outer foliage mass (dark base layer) -->
  <circle cx="36" cy="38" r="22" fill="#1a4a1a"/>
  <circle cx="20" cy="40" r="16" fill="#1a4a1a"/>
  <circle cx="52" cy="40" r="16" fill="#1a4a1a"/>

  <!-- Mid foliage layer -->
  <circle cx="36" cy="34" r="19" fill="#2a6a2a"/>
  <circle cx="22" cy="37" r="14" fill="#2a6a2a"/>
  <circle cx="50" cy="37" r="14" fill="#2a6a2a"/>
  <circle cx="36" cy="45" r="12" fill="#2a6a2a"/>

  <!-- Upper foliage (lighter, catching light) -->
  <circle cx="36" cy="28" r="15" fill="#3a8a3a"/>
  <circle cx="24" cy="31" r="11" fill="#3a8a3a"/>
  <circle cx="48" cy="31" r="11" fill="#3a8a3a"/>

  <!-- Top highlights -->
  <circle cx="36" cy="22" r="10" fill="#50aa50"/>
  <circle cx="27" cy="26" r="7"  fill="#50aa50"/>
  <circle cx="45" cy="26" r="7"  fill="#50aa50"/>

  <!-- Leaf shine glints -->
  <ellipse cx="29" cy="18" rx="5" ry="3" fill="#80cc70" opacity="0.8" transform="rotate(-25,29,18)"/>
  <ellipse cx="43" cy="17" rx="5" ry="3" fill="#80cc70" opacity="0.7" transform="rotate(20,43,17)"/>
  <ellipse cx="20" cy="28" rx="4" ry="2.5" fill="#80cc70" opacity="0.6" transform="rotate(-15,20,28)"/>
  <ellipse cx="53" cy="28" rx="4" ry="2.5" fill="#80cc70" opacity="0.6" transform="rotate(15,53,28)"/>
  <ellipse cx="36" cy="14" rx="4" ry="2.5" fill="#80cc70" opacity="0.65"/>

  <!-- Leaf edge details (small dark outlines to suggest individual leaves) -->
  <circle cx="17" cy="34" r="4" fill="#2a6a2a" opacity="0.5"/>
  <circle cx="56" cy="34" r="4" fill="#2a6a2a" opacity="0.5"/>
  <circle cx="14" cy="42" r="3" fill="#1a4a1a" opacity="0.6"/>
  <circle cx="58" cy="42" r="3" fill="#1a4a1a" opacity="0.6"/>

</svg>