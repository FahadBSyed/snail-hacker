<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 60" width="90" height="60">

  <!-- Ground shadow -->
  <ellipse cx="42" cy="56" rx="29" ry="7" fill="#000000" opacity="0.20"/>

  <!-- Neck / collar -->
  <rect x="1" y="15" width="18" height="30" rx="4" fill="#2a1040" stroke="#180828" stroke-width="1"/>
  <line x1="8" y1="16" x2="8" y2="44" stroke="#3c1a58" stroke-width="1.2" opacity="0.7"/>
  <circle cx="9" cy="17" r="2" fill="#180828" stroke="#3c1a58" stroke-width="0.7"/>
  <circle cx="9" cy="43" r="2" fill="#180828" stroke="#3c1a58" stroke-width="0.7"/>
  <rect x="1" y="15" width="18" height="2" fill="#ffcc44" opacity="0.8"/>
  <rect x="1" y="44" width="18" height="2" fill="#ffcc44" opacity="0.8"/>

  <!-- Main head -->
  <ellipse cx="40" cy="30" rx="32" ry="22" fill="#160822" stroke="#0a0414" stroke-width="1.2"/>
  <!-- Snout -->
  <ellipse cx="67" cy="30" rx="11" ry="13" fill="#220e34" stroke="#0a0414" stroke-width="1"/>

  <!-- Scale lines -->
  <line x1="24" y1="7" x2="29" y2="53" stroke="#1a0c2c" stroke-width="1" opacity="0.50"/>
  <line x1="35" y1="7" x2="40" y2="53" stroke="#1a0c2c" stroke-width="1" opacity="0.50"/>
  <line x1="46" y1="7" x2="51" y2="53" stroke="#1a0c2c" stroke-width="1" opacity="0.50"/>
  <line x1="56" y1="7" x2="61" y2="53" stroke="#1a0c2c" stroke-width="1" opacity="0.50"/>

  <!-- Dorsal ridge highlight -->
  <ellipse cx="40" cy="13" rx="18" ry="6" fill="#220e34" opacity="0.38"/>

  <!-- Forked tongue -->
  <line x1="77" y1="30" x2="83" y2="30" stroke="#ff3344" stroke-width="2" stroke-linecap="round"/>
  <line x1="83" y1="30" x2="87" y2="22" stroke="#ff3344" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="83" y1="30" x2="87" y2="38" stroke="#ff3344" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Eye — top side -->
  <circle cx="44" cy="8" r="6.5" fill="#220e34" stroke="#0a0414" stroke-width="0.8"/>
  <circle cx="44" cy="8" r="5" fill="#cc44ff"/>
  <ellipse cx="44" cy="8" rx="1.5" ry="4" fill="#111100"/>
  <circle cx="42" cy="6" r="1" fill="white" opacity="0.65"/>
  <circle cx="44" cy="8" r="8.5" fill="none" stroke="#ffcc44" stroke-width="0.8" opacity="0.45"/>

  <!-- Eye — bottom side -->
  <circle cx="44" cy="52" r="6.5" fill="#220e34" stroke="#0a0414" stroke-width="0.8"/>
  <circle cx="44" cy="52" r="5" fill="#cc44ff"/>
  <ellipse cx="44" cy="52" rx="1.5" ry="4" fill="#111100"/>
  <circle cx="42" cy="50" r="1" fill="white" opacity="0.65"/>
  <circle cx="44" cy="52" r="8.5" fill="none" stroke="#ffcc44" stroke-width="0.8" opacity="0.45"/>

  <!-- Nostril dots -->
  <circle cx="71" cy="22" r="1.2" fill="#0a0414" opacity="0.8"/>
  <circle cx="71" cy="38" r="1.2" fill="#0a0414" opacity="0.8"/>

  <!-- Boss crown -->
  <path d="M27,15 L30,5 L34,15 L37,5 L40,15" fill="none" stroke="#ffcc44" stroke-width="1.8" stroke-linejoin="round" opacity="0.9"/>
</svg>