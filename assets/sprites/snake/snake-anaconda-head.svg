<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 138 96" width="138" height="96">

  <!-- Ground shadow -->
  <ellipse cx="66" cy="92" rx="48" ry="11" fill="#000000" opacity="0.20"/>

  <!-- Neck / collar -->
  <rect x="1" y="24" width="28" height="48" rx="4" fill="#1e4010" stroke="#0a1a06" stroke-width="1"/>
  <line x1="13" y1="26" x2="13" y2="70" stroke="#2e5c1a" stroke-width="1.2" opacity="0.7"/>
  <circle cx="14" cy="27" r="2" fill="#0a1a06" stroke="#2e5c1a" stroke-width="0.7"/>
  <circle cx="14" cy="69" r="2" fill="#0a1a06" stroke="#2e5c1a" stroke-width="0.7"/>
  <rect x="1" y="24" width="28" height="2" fill="#ffcc44" opacity="0.8"/>
  <rect x="1" y="70" width="28" height="2" fill="#ffcc44" opacity="0.8"/>

  <!-- Main head -->
  <ellipse cx="64" cy="48" rx="51" ry="35" fill="#1a380a" stroke="#0c1e06" stroke-width="1.2"/>
  <!-- Snout -->
  <ellipse cx="108" cy="48" rx="18" ry="21" fill="#2d5c16" stroke="#0c1e06" stroke-width="1"/>

  <!-- Scale lines -->
  <line x1="38" y1="12" x2="43" y2="84" stroke="#0e2808" stroke-width="1" opacity="0.50"/>
  <line x1="56" y1="12" x2="61" y2="84" stroke="#0e2808" stroke-width="1" opacity="0.50"/>
  <line x1="74" y1="12" x2="79" y2="84" stroke="#0e2808" stroke-width="1" opacity="0.50"/>
  <line x1="90" y1="12" x2="95" y2="84" stroke="#0e2808" stroke-width="1" opacity="0.50"/>

  <!-- Dorsal ridge highlight -->
  <ellipse cx="64" cy="21" rx="28" ry="9" fill="#2d5c16" opacity="0.38"/>

  <!-- Forked tongue -->
  <line x1="125" y1="48" x2="134" y2="48" stroke="#ff3344" stroke-width="2" stroke-linecap="round"/>
  <line x1="134" y1="48" x2="135" y2="35" stroke="#ff3344" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="134" y1="48" x2="135" y2="61" stroke="#ff3344" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Eye — top side -->
  <circle cx="70" cy="13" r="6.5" fill="#2d5c16" stroke="#0c1e06" stroke-width="0.8"/>
  <circle cx="70" cy="13" r="5" fill="#ffee00"/>
  <ellipse cx="70" cy="13" rx="1.5" ry="4" fill="#111100"/>
  <circle cx="68" cy="11" r="1" fill="white" opacity="0.65"/>
  <circle cx="70" cy="13" r="8.5" fill="none" stroke="#ffcc44" stroke-width="0.8" opacity="0.45"/>

  <!-- Eye — bottom side -->
  <circle cx="70" cy="83" r="6.5" fill="#2d5c16" stroke="#0c1e06" stroke-width="0.8"/>
  <circle cx="70" cy="83" r="5" fill="#ffee00"/>
  <ellipse cx="70" cy="83" rx="1.5" ry="4" fill="#111100"/>
  <circle cx="68" cy="81" r="1" fill="white" opacity="0.65"/>
  <circle cx="70" cy="83" r="8.5" fill="none" stroke="#ffcc44" stroke-width="0.8" opacity="0.45"/>

  <!-- Nostril dots -->
  <circle cx="114" cy="36" r="1.2" fill="#0c1e06" opacity="0.8"/>
  <circle cx="114" cy="60" r="1.2" fill="#0c1e06" opacity="0.8"/>

  <!-- Black spots on head (boss anaconda only) -->
  <ellipse cx="40.96" cy="36.48" rx="7.04" ry="9.6" fill="#050e03" opacity="0.78"/>
  <ellipse cx="64" cy="57.6" rx="7.04" ry="9.6" fill="#050e03" opacity="0.78"/>
  <ellipse cx="83.2" cy="34.56" rx="7.04" ry="9.6" fill="#050e03" opacity="0.78"/>

  <!-- Boss crown -->
  <path d="M44,20 L49,10 L54,20 L59,10 L64,20" fill="none" stroke="#ffcc44" stroke-width="1.8" stroke-linejoin="round" opacity="0.9"/>
</svg>