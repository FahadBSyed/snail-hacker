<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 48" width="64" height="48">

  <!-- Ground shadow -->
  <ellipse cx="35" cy="43" rx="25" ry="6" fill="#000000" opacity="0.22"/>

  <!-- Neck / collar (metallic ring at left) -->
  <rect x="1" y="12" width="14" height="24" rx="4" fill="#405010" stroke="#283408" stroke-width="1"/>
  <!-- Collar highlight edge -->
  <line x1="6" y1="13" x2="6" y2="35" stroke="#587018" stroke-width="1.2" opacity="0.7"/>
  <!-- Collar ring bolts -->
  <circle cx="7" cy="13" r="2" fill="#283408" stroke="#587018" stroke-width="0.7"/>
  <circle cx="7" cy="35" r="2" fill="#283408" stroke="#587018" stroke-width="0.7"/>
  

  <!-- Main head body -->
  <ellipse cx="33" cy="24" rx="27" ry="17" fill="#3a5a10" stroke="#243808" stroke-width="1.2"/>
  <!-- Snout bulge -->
  <ellipse cx="56" cy="24" rx="9" ry="10" fill="#4e7818" stroke="#243808" stroke-width="1"/>

  <!-- Scale texture (diagonal stroke lines across head) -->
  <line x1="19" y1="7" x2="25" y2="41" stroke="#2e4a0c" stroke-width="1.1" opacity="0.55"/>
  <line x1="28" y1="7" x2="34" y2="41" stroke="#2e4a0c" stroke-width="1.1" opacity="0.55"/>
  <line x1="37" y1="7" x2="43" y2="41" stroke="#2e4a0c" stroke-width="1.1" opacity="0.55"/>
  <line x1="45" y1="7" x2="51" y2="41" stroke="#2e4a0c" stroke-width="1.1" opacity="0.55"/>
  <!-- Cross hatching on snout -->
  <line x1="49" y1="14" x2="59" y2="29" stroke="#243808" stroke-width="0.8" opacity="0.5"/>

  <!-- Head highlight (dorsal ridge) -->
  <ellipse cx="33" cy="12" rx="16" ry="5" fill="#4e7818" opacity="0.45"/>

  <!-- Visor dome (space helmet glass) -->
  <ellipse cx="28" cy="21" rx="13" ry="11" fill="rgba(160,255,40,0.38)" stroke="#a8ee28" stroke-width="1.4"/>
  <!-- Visor interior depth -->
  <ellipse cx="28" cy="21" rx="11" ry="9" fill="#ccff66" opacity="0.12"/>
  <!-- Visor glare (top-left) -->
  <ellipse cx="22" cy="16" rx="4" ry="2" fill="white" opacity="0.22" transform="rotate(-20,22,16)"/>

  <!-- Alien eyes (through visor) -->
  <ellipse cx="23" cy="21" rx="3" ry="5" fill="#d4ff22"/>
  <ellipse cx="33" cy="21" rx="3" ry="5" fill="#d4ff22"/>
  <!-- Slit pupils -->
  <ellipse cx="23" cy="21" rx="1" ry="4" fill="#111100"/>
  <ellipse cx="33" cy="21" rx="1" ry="4" fill="#111100"/>
  <!-- Eye glow -->
  <ellipse cx="23" cy="21" rx="5" ry="7" fill="#d4ff22" opacity="0.28"/>
  <ellipse cx="33" cy="21" rx="5" ry="7" fill="#d4ff22" opacity="0.28"/>

  <!-- Antennae -->
  <line x1="20" y1="11" x2="18" y2="2" stroke="#aae020" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="18" cy="2" r="2" fill="#aae020"/>
  <circle cx="18" cy="2" r="3.5" fill="#aae020" opacity="0.25"/>
  <line x1="28" y1="11" x2="32" y2="2" stroke="#aae020" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="32" cy="2" r="2" fill="#aae020"/>
  <circle cx="32" cy="2" r="3.5" fill="#aae020" opacity="0.25"/>

  <!-- Nostril dots on snout -->
  <circle cx="58" cy="18" r="1.3" fill="#243808" opacity="0.8"/>
  <circle cx="58" cy="30" r="1.3" fill="#243808" opacity="0.8"/>

  
</svg>