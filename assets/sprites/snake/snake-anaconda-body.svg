  <ellipse cx="18" cy="15" rx="6" ry="8" fill="none" stroke="#1a0c2c" stroke-width="1" opacity="0.6"/>
  <ellipse cx="28" cy="15" rx="6" ry="8" fill="none" stroke="#1a0c2c" stroke-width="1" opacity="0.6"/>

  <!-- Spine seam (glowing line along body center) -->
