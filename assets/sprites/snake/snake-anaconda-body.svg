  <!-- Body pill -->
  <rect x="2" y="4" width="60" height="40" rx="20" fill="#1a3810" stroke="#0c1e06" stroke-width="1"/>

  <!-- Dorsal ridge (lighter top surface) -->
  <ellipse cx="32" cy="16" rx="25" ry="8" fill="#2c5218" opacity="0.5"/>

  <!-- Scale plate arcs -->
  <ellipse cx="14" cy="26" rx="11" ry="17" fill="none" stroke="#0e2808" stroke-width="1" opacity="0.6"/>
  <ellipse cx="32" cy="26" rx="11" ry="17" fill="none" stroke="#0e2808" stroke-width="1" opacity="0.6"/>
  <ellipse cx="50" cy="26" rx="11" ry="17" fill="none" stroke="#0e2808" stroke-width="1" opacity="0.6"/>

  <!-- Black spots (boss anaconda only) -->
  <ellipse cx="14" cy="20" rx="5.4" ry="8.8" fill="#050e03" opacity="0.82"/>
  <ellipse cx="24.8" cy="29.6" rx="4.8" ry="8" fill="#050e03" opacity="0.82"/>
  <ellipse cx="35" cy="18.4" rx="5.4" ry="8.8" fill="#050e03" opacity="0.82"/>
  <ellipse cx="45.8" cy="28.8" rx="4.8" ry="8" fill="#050e03" opacity="0.82"/>
  <ellipse cx="54.8" cy="20.8" rx="4.2" ry="7.2" fill="#050e03" opacity="0.82"/>

  <!-- Spine seam (glowing line along body center) -->
