  <!-- Dorsal ridge (lighter top surface) -->
  <ellipse cx="16" cy="9" rx="12" ry="3" fill="#aa1818" opacity="0.5"/>

  <!-- Scale plate arcs -->
  <ellipse cx="8" cy="13" rx="5" ry="7" fill="none" stroke="#741010" stroke-width="1" opacity="0.6"/>
  <ellipse cx="16" cy="13" rx="5" ry="7" fill="none" stroke="#741010" stroke-width="1" opacity="0.6"/>
  <ellipse cx="24" cy="13" rx="5" ry="7" fill="none" stroke="#741010" stroke-width="1" opacity="0.6"/>

  <!-- Black spots (boss anaconda only) -->
  <!-- no spots -->

  <!-- Spine seam (glowing line along body center) -->
  <line x1="10" y1="12" x2="22" y2="12" stroke="#ee3333" stroke-width="1.2" opacity="0.7"/>
  <!-- Seam glow -->
  <line x1="10" y1="12" x2="22" y2="12" stroke="#ee3333" stroke-width="3" opacity="0.2"/>
