  <circle cx="64.53" cy="73.29" r="2.2" fill="#ff4455" opacity="0.95"/>
  <circle cx="48" cy="74.57" r="2.2" fill="#ffaa00" opacity="0.95"/>
  <circle cx="31.47" cy="73.29" r="2.2" fill="#ff2233" opacity="0.95"/>
  <circle cx="19.37" cy="69.78" r="2.2" fill="#ffdd11" opacity="0.95"/>
  <circle cx="14.94" cy="65" r="2.2" fill="#ff5566" opacity="0.95"/>
  <circle cx="19.37" cy="60.21" r="2.2" fill="#ffbb00" opacity="0.95"/>
  <circle cx="31.47" cy="56.71" r="2.2" fill="#ff3344" opacity="0.95"/>
