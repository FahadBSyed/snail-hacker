    <circle  cx="41" cy="29" r="1.8" fill="#2eaa2e"/>
    <circle  cx="41" cy="51" r="1.8" fill="#2eaa2e"/>
    <circle cx="57"  cy="32"  r="4.5" fill="#dde840"/>
