  <!-- Dome glass — outer ring, inner ring, shine highlight -->
  <circle cx="48" cy="40" r="20"
          fill="none" stroke="#ff2244" stroke-width="2.5" opacity="0.88"/>
  <circle cx="48" cy="40" r="17"
