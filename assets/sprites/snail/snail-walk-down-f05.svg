<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">

  <!-- body hump (ellipse) -->
  <ellipse cx="24" cy="31" rx="6" ry="5" fill="#E8D44D"/>
  <!-- foot prism (sine-wave sole) -->
  <path d="M 18 34 L 30 34 L 30.0 38.5 L 29.0 38.8 L 28.0 39.3 L 27.0 39.6 L 26.0 39.5 L 25.0 39.2 L 24.0 38.7 L 23.0 38.4 L 22.0 38.5 L 21.0 38.8 L 20.0 39.3 L 19.0 39.6 L 18.0 39.5 Z" fill="#E8D44D"/>

  <!-- slime trail -->
  <ellipse cx="24" cy="8" rx="3" ry="1.5" fill="#E8D44D" opacity="0.25"/>

  <!-- antenna left — eye at stalk tip -->
  <line x1="20" y1="32" x2="13.4" y2="41.1" stroke="#E8D44D" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="13.4" cy="41.1" r="2" fill="#1a1a1a"/>
  <circle cx="14.0" cy="40.4" r="0.7" fill="white"/>

  <!-- antenna right — eye at stalk tip -->
  <line x1="28" y1="32" x2="33.4" y2="41.1" stroke="#E8D44D" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="33.4" cy="41.1" r="2" fill="#1a1a1a"/>
  <circle cx="34.0" cy="40.4" r="0.7" fill="white"/>

  <!-- mouth -->
  <path d="M22 33 Q24 35 26 33" stroke="#1a1a1a" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- shell LAST — sits on top of body at top of frame -->
  <circle cx="24" cy="18" r="13" fill="#8B5E3C"/>
  <circle cx="24" cy="19" r="9"  fill="#A0714F"/>
  <circle cx="24" cy="20" r="5"  fill="#BD8C64"/>

</svg>