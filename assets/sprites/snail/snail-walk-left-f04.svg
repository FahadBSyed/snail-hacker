<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">

  <g transform="translate(48, 0) scale(-1, 1)">

  <!-- body hump (ellipse) -->
  <ellipse cx="30" cy="26" rx="12" ry="6" fill="#E8D44D"/>
  <!-- foot prism -->
  <path d="M 18 30 L 42 30 L 42.0 33.5 L 40.0 33.5 L 38.0 34.0 L 36.0 34.5 L 34.0 34.5 L 32.0 34.0 L 30.0 33.5 L 28.0 33.5 L 26.0 34.0 L 24.0 34.5 L 22.0 34.5 L 20.0 34.0 L 18.0 33.5 Z" fill="#E8D44D"/>

  <!-- slime trail -->
  <ellipse cx="14" cy="36" rx="4" ry="1.2" fill="#E8D44D" opacity="0.25"/>

  <!-- antenna left — eye at stalk tip -->
  <line x1="32" y1="24" x2="28" y2="13.1" stroke="#E8D44D" stroke-width="1.5" stroke-linecap="round"/>
  <!-- antenna right — eye at stalk tip -->
  <line x1="36" y1="24" x2="38" y2="11.1" stroke="#E8D44D" stroke-width="1.5" stroke-linecap="round"/>

  <!-- shell LAST — sits on top of body -->
  <circle cx="18" cy="24" r="12" fill="#8B5E3C"/>
  <circle cx="19" cy="24" r="8"  fill="#A0714F"/>
  <circle cx="20" cy="24" r="4"  fill="#BD8C64"/>

  <circle cx="28.0" cy="13.1" r="2.0" fill="#1a1a1a"/>
  <circle cx="28.5" cy="12.4" r="0.6" fill="white"/>
  <circle cx="38.0" cy="11.1" r="2.0" fill="#1a1a1a"/>
  <circle cx="38.6" cy="10.4" r="0.6" fill="white"/>
  </g>

</svg>