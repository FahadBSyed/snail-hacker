  <rect x="8" y="42" width="48" height="18" fill="#b8b5ad" stroke="#555045" stroke-width="1"/>
  <rect x="12"  y="46" width="16" height="3" rx="0.5" fill="#3a3730" stroke="#999488" stroke-width="0.5"/>
  <rect x="12"  y="51" width="16" height="3" rx="0.5" fill="#3a3730" stroke="#999488" stroke-width="0.5"/>
  <circle cx="32" cy="47.5" r="1.5" fill="#ff4400" opacity="0.9"/>
  <circle cx="32" cy="47.5" r="3"   fill="#ff4400" opacity="0.2"/>
  <line x1="42" y1="45"  x2="52" y2="45"  stroke="#999488" stroke-width="0.7"/>
  <line x1="42" y1="48"  x2="52" y2="48"  stroke="#999488" stroke-width="0.7"/>
  <line x1="42" y1="51"  x2="52" y2="51"  stroke="#999488" stroke-width="0.7"/>
  <line x1="42" y1="54" x2="52" y2="54" stroke="#999488" stroke-width="0.7"/>

  <!-- Monitor top face -->
  <polygon points="10,14 54,14 54,8 10,8" fill="#d8d5cc" stroke="#555045" stroke-width="1"/>
  <rect x="10" y="14" width="44" height="26" fill="#c0bdb5" stroke="#555045" stroke-width="1"/>
  <rect x="13" y="17" width="38" height="19" rx="2" fill="#3a3730" stroke="#555045" stroke-width="0.8"/>
  <rect x="15" y="19" width="34" height="15" rx="1" fill="#001a12" stroke="#ff4400" stroke-width="0.8"/>
  <rect x="16" y="21"  width="32" height="1.2" fill="#ff4400" opacity="0.55"/>
  <rect x="16" y="24" width="32" height="1.2" fill="#ff4400" opacity="0.4"/>
  <rect x="16" y="27" width="32" height="1.2" fill="#ff4400" opacity="0.55"/>
  <rect x="15" y="19" width="34" height="15" rx="1" fill="#ff4400" opacity="0.05"/>
  <rect x="16" y="19" width="7" height="3" rx="1" fill="white" opacity="0.12"/>
  <circle cx="48" cy="35" r="1.8" fill="#ff4400"/>
  <circle cx="48" cy="35" r="3.5" fill="#ff4400" opacity="0.2"/>
  <rect x="24" y="35" width="16" height="2.5" rx="0.5" fill="#d8d5cc" opacity="0.6"/>

  
  <!-- Screen warning bars -->
  <rect x="16" y="20" width="32" height="2" rx="0.5" fill="#ff4400" opacity="0.7"/>
  <rect x="16" y="31" width="30" height="2" rx="0.5" fill="#ff4400" opacity="0.7"/>
  <!-- Exclamation mark on screen -->
  <rect x="30.5" y="22" width="3" height="6" rx="1" fill="#ff4400" opacity="0.9"/>
  <circle cx="32" cy="31" r="1.8" fill="#ff4400" opacity="0.9"/>
  <!-- Flame on desk -->
  <ellipse cx="47"  cy="55" rx="3.5" ry="6"   fill="#ff6600" opacity="0.95"/>
  <ellipse cx="51"  cy="54"  rx="3"   ry="5.5" fill="#ff4400" opacity="0.95"/>
  <ellipse cx="55" cy="55" rx="3.5" ry="6"   fill="#ff6600" opacity="0.95"/>
  <!-- Inner flame (brighter) -->
  <ellipse cx="49"  cy="56" rx="2"   ry="4"   fill="#ffcc00" opacity="0.9"/>
  <ellipse cx="53"  cy="56" rx="2"   ry="4"   fill="#ffcc00" opacity="0.9"/>
  <!-- Flame glow -->
  <ellipse cx="51"  cy="55" rx="7"   ry="8"   fill="#ff4400" opacity="0.15"/>

