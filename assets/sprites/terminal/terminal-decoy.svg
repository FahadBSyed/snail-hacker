<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- ── Desk unit top face (oblique strip directly above front) ── -->
  <polygon points="8,42 56,42 56,35 8,35"
           fill="#ccc9c1" stroke="#555045" stroke-width="1"/>
  <!-- Desk front face -->
  <rect x="8" y="42" width="48" height="18" fill="#b8b5ad" stroke="#555045" stroke-width="1"/>
  <!-- Drive bay slots on desk front -->
  <rect x="12"  y="46"  width="16" height="3" rx="0.5" fill="#3a3730" stroke="#999488" stroke-width="0.5"/>
  <rect x="12"  y="51"  width="16" height="3" rx="0.5" fill="#3a3730" stroke="#999488" stroke-width="0.5"/>
  <!-- Drive LED -->
  <circle cx="32" cy="47.5" r="1.5" fill="#ff44cc" opacity="0.9"/>
  <circle cx="32" cy="47.5" r="3"   fill="#ff44cc" opacity="0.2"/>
  <!-- Vent grille on desk front right -->
  <line x1="42" y1="45"  x2="52" y2="45"  stroke="#999488" stroke-width="0.7"/>
  <line x1="42" y1="48"  x2="52" y2="48"  stroke="#999488" stroke-width="0.7"/>
  <line x1="42" y1="51"  x2="52" y2="51"  stroke="#999488" stroke-width="0.7"/>
  <line x1="42" y1="54" x2="52" y2="54" stroke="#999488" stroke-width="0.7"/>

  <!-- ── Monitor top face (oblique strip directly above front) ── -->
  <polygon points="10,14 54,14 54,8 10,8"
           fill="#d8d5cc" stroke="#555045" stroke-width="1"/>
  <!-- Monitor front face (bezel) -->
  <rect x="10" y="14" width="44" height="26" fill="#c0bdb5" stroke="#555045" stroke-width="1"/>
  <!-- CRT bezel inset -->
  <rect x="13" y="17" width="38" height="19" rx="2"
        fill="#3a3730" stroke="#555045" stroke-width="0.8"/>
  <!-- CRT screen -->
  <rect x="15" y="19" width="34" height="15" rx="1"
        fill="#001a12" stroke="#ff44cc" stroke-width="0.8"/>

  <!-- Scan-line glow on screen -->
  <rect x="16" y="21"  width="32" height="1.2" fill="#ff44cc" opacity="0.55"/>
  <rect x="16" y="24" width="32" height="1.2" fill="#ff44cc" opacity="0.4"/>
  <rect x="16" y="27" width="32" height="1.2" fill="#ff44cc" opacity="0.55"/>
  <rect x="16" y="30" width="30" height="1.2" fill="#ff44cc" opacity="0.3"/>
  <!-- Screen ambient glow -->
  <rect x="15" y="19" width="34" height="15" rx="1"
        fill="#ff44cc" opacity="0.05"/>

  <!-- Screen glare highlight (top-left) -->
  <rect x="16" y="19" width="7" height="3" rx="1"
        fill="white" opacity="0.12"/>

  <!-- Indicator LED on bezel (bottom-right) -->
  <circle cx="48" cy="35" r="1.8" fill="#ff44cc"/>
  <circle cx="48" cy="35" r="3.5" fill="#ff44cc" opacity="0.2"/>

  <!-- Monitor brand badge (embossed strip) -->
  <rect x="24" y="35" width="16" height="2.5" rx="0.5"
        fill="#d8d5cc" opacity="0.6"/>

  <!-- Type-specific accent detail -->
  
  <!-- Decoy beacon: centre circle with crosshair on screen -->
  <circle cx="32" cy="33" r="4.5" fill="none" stroke="#ff44cc" stroke-width="1" opacity="0.85"/>
  <line x1="25" y1="33" x2="26.5" y2="33" stroke="#ff44cc" stroke-width="0.9" opacity="0.7"/>
  <line x1="37.5" y1="33" x2="39" y2="33" stroke="#ff44cc" stroke-width="0.9" opacity="0.7"/>
  <line x1="32" y1="26" x2="32" y2="27.5" stroke="#ff44cc" stroke-width="0.9" opacity="0.7"/>
  <line x1="32" y1="38.5" x2="32" y2="40" stroke="#ff44cc" stroke-width="0.9" opacity="0.7"/>
  <!-- Bright centre dot -->
  <circle cx="32" cy="33" r="1.5" fill="#ff44cc" opacity="0.9"/>
  <!-- Outer pulse ring -->
  <circle cx="32" cy="33" r="8" fill="none" stroke="#ff44cc" stroke-width="0.6" opacity="0.35"/>
  <!-- Signal waves on desk front: three arcs expanding upward -->
  <path d="M42,52 a4,4 0 0 1 8,0"
        fill="none" stroke="#ff44cc" stroke-width="1.1" stroke-linecap="round" opacity="0.85"/>
  <path d="M39,52 a7,7 0 0 1 14,0"
        fill="none" stroke="#ff44cc" stroke-width="0.8" stroke-linecap="round" opacity="0.55"/>
  <path d="M36,52 a10,10 0 0 1 20,0"
        fill="none" stroke="#ff44cc" stroke-width="0.6" stroke-linecap="round" opacity="0.3"/>
  <!-- Antenna dot at base of waves -->
  <circle cx="46" cy="53" r="1.2" fill="#ff44cc" opacity="0.8"/>

</svg>