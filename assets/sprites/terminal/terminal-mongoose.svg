  <line x1="42" y1="54" x2="52" y2="54" stroke="#999488" stroke-width="0.7"/>

  <!-- Monitor top face -->
  <polygon points="10,14 54,14 54,8 10,8" fill="#d8d5cc" stroke="#555045" stroke-width="1"/>
  <rect x="10" y="14" width="44" height="26" fill="#c0bdb5" stroke="#555045" stroke-width="1"/>
  <rect x="13" y="17" width="38" height="19" rx="2" fill="#3a3730" stroke="#555045" stroke-width="0.8"/>
  <rect x="15" y="19" width="34" height="15" rx="1" fill="#001a12" stroke="#dd8800" stroke-width="0.8"/>
  <rect x="16" y="21"  width="32" height="1.2" fill="#dd8800" opacity="0.55"/>
  <rect x="16" y="24" width="32" height="1.2" fill="#dd8800" opacity="0.4"/>
  <rect x="16" y="27" width="32" height="1.2" fill="#dd8800" opacity="0.55"/>
  <rect x="15" y="19" width="34" height="15" rx="1" fill="#dd8800" opacity="0.05"/>
  <rect x="16" y="19" width="7" height="3" rx="1" fill="white" opacity="0.12"/>
  <circle cx="48" cy="35" r="1.8" fill="#dd8800"/>
