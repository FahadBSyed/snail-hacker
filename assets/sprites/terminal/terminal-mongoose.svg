  <rect x="24" y="35" width="16" height="2.5" rx="0.5" fill="#d8d5cc" opacity="0.6"/>

  
  <!-- Mongoose silhouette on screen (body + head + tail) -->
  <!-- Body -->
  <ellipse cx="30" cy="28" rx="9" ry="4.5" fill="#dd8800" opacity="0.8"/>
  <!-- Head -->
  <ellipse cx="39" cy="26" rx="4.5" ry="3.5" fill="#dd8800" opacity="0.8"/>
  <!-- Snout -->
  <ellipse cx="43" cy="27" rx="2.5" ry="1.8" fill="#dd8800" opacity="0.8"/>
  <!-- Ear -->
  <ellipse cx="39" cy="23" rx="1.5" ry="2"   fill="#dd8800" opacity="0.8"/>
  <!-- Tail (curved up) -->
  <path d="M21,29 Q15,24 18,20" fill="none" stroke="#dd8800" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <!-- Legs -->
  <line x1="26"  y1="32" x2="25"  y2="36" stroke="#dd8800" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="32" y1="32" x2="33" y2="36" stroke="#dd8800" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- Paw print on desk -->
  <!-- Main pad -->
  <ellipse cx="46" cy="57" rx="3.5" ry="2.5" fill="#dd8800" opacity="0.85"/>
  <!-- Toe pads -->
  <circle cx="43"  cy="54"  r="1.4" fill="#dd8800" opacity="0.85"/>
  <circle cx="46"  cy="53"  r="1.4" fill="#dd8800" opacity="0.85"/>
  <circle cx="49"  cy="54"  r="1.4" fill="#dd8800" opacity="0.85"/>
  <circle cx="51"  cy="56"  r="1.2" fill="#dd8800" opacity="0.75"/>

</svg>