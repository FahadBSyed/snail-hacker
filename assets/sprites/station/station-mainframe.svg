<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">

  <!-- ── Cabinet top face (oblique strip directly above front) ── -->
  <polygon points="12,46 82,46 82,36 12,36" fill="#e2e4ea" stroke="#5a6070" stroke-width="1"/>

  <!-- ── Cabinet front face ── -->
  <rect x="12" y="46" width="70" height="36" fill="#c8ccd4" stroke="#5a6070" stroke-width="1"/>

  <!-- Dark panel strip across top of front face (contains LEDs) -->
  <rect x="12" y="46" width="70" height="11" fill="#1a1e2a" stroke="none"/>

  <!-- Status LEDs -->
  <circle cx="19"  cy="51.5" r="2.5" fill="#33ff44"/>
  <circle cx="26" cy="51.5" r="2.5" fill="#33ff44"/>
  <circle cx="33" cy="51.5" r="2.5" fill="#ffbb00"/>
  <circle cx="40" cy="51.5" r="2.5" fill="#ff3322"/>
  <!-- LED glow halos -->
  <circle cx="19"  cy="51.5" r="4" fill="#33ff44"  opacity="0.25"/>
  <circle cx="40" cy="51.5" r="4" fill="#ff3322"    opacity="0.25"/>

  <!-- CRT matrix display (central, glowing) -->
  <rect x="18" y="60" width="34" height="19" rx="2" fill="#1a1e2a" stroke="#00ffcc" stroke-width="1"/>
  <!-- Scan-line effect: thin horizontal lines -->
  <rect x="19"  y="62" width="32" height="1" fill="#00ffcc" opacity="0.6"/>
  <rect x="19"  y="65" width="32" height="1" fill="#00ffcc" opacity="0.4"/>
  <rect x="19"  y="68" width="32" height="1" fill="#00ffcc" opacity="0.6"/>
  <rect x="19"  y="71" width="24" height="1" fill="#00ffcc" opacity="0.3"/>
  <rect x="19"  y="74" width="28" height="1" fill="#00ffcc" opacity="0.5"/>
  <!-- Screen ambient glow -->
  <rect x="18" y="60" width="34" height="19" rx="2" fill="#00ffcc" opacity="0.07"/>

  <!-- Tape reels — right side of front face -->
  <!-- Left reel -->
  <circle cx="62" cy="64" r="8"   fill="#2a2e38" stroke="#444a58" stroke-width="1.5"/>
  <circle cx="62" cy="64" r="3"   fill="#888ea0"/>
  <!-- Reel spokes -->
  <line x1="62" y1="58" x2="62" y2="61" stroke="#444a58" stroke-width="1"/>
  <line x1="62" y1="67" x2="62" y2="70" stroke="#444a58" stroke-width="1"/>
  <line x1="56" y1="64" x2="59" y2="64" stroke="#444a58" stroke-width="1"/>
  <line x1="65" y1="64" x2="68" y2="64" stroke="#444a58" stroke-width="1"/>
  <!-- Right reel (smaller) -->
  <circle cx="72" cy="72" r="5.5" fill="#2a2e38" stroke="#444a58" stroke-width="1.5"/>
  <circle cx="72" cy="72" r="2"   fill="#888ea0"/>

  <!-- Vent grille (bottom-right of front face) -->
  <line x1="56" y1="81" x2="76" y2="81" stroke="#555a66" stroke-width="0.8"/>
  <line x1="56" y1="79" x2="76" y2="79" stroke="#555a66" stroke-width="0.8"/>
  <line x1="56" y1="77" x2="76" y2="77" stroke="#555a66" stroke-width="0.8"/>

  <!-- Punch-card slot (bottom-left) -->
  <rect x="17" y="82" width="28" height="4" rx="1" fill="#1a1e2a" stroke="#555a66" stroke-width="0.8"/>

  <!-- ── Gun mount platform (raised disc on top face) ── -->
  <!-- Shadow/base ring -->
  <ellipse cx="49" cy="39" rx="14" ry="5" fill="#00000033"/>
  <!-- Mount disc -->
  <ellipse cx="47" cy="36"     rx="14" ry="5"   fill="#e2e4ea" stroke="#5a6070" stroke-width="1"/>
  <ellipse cx="47" cy="33" rx="11" ry="3.5" fill="#c8ccd4" stroke="#5a6070" stroke-width="0.8"/>
  <!-- Centre pivot hole -->
  <circle  cx="47" cy="33" r="3" fill="#1a1e2a" stroke="#5a6070" stroke-width="0.8"/>

</svg>